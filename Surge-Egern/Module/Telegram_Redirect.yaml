name: "Telegram 重定向"
description: "将 Telegram 重定向到你选择的 Telegram 三方客户端"
author: "Szt416"
icon: https://iili.io/KQX347S.png
env_schema:
  CLIENT:
    name: "Telegram 客户端"
    description: "选择要跳转到的 Telegram 客户端"
    default_value: "Telegram"
    options:
      - Telegram
      - Swiftgram
      - Turrit
      - iMe
      - Nicegram
      - Lingogram
      - Nagram
      - Mithka
scriptings:
  - http_request:
      name: "Telegram 链接重定向"
      match: "^https?://t\\.me/.+"
      script_url: https://raw.githubusercontent.com/szt416/Rules/refs/heads/main/Surge-Egern/Scripts/Telegram/TgRedirect.js
      timeout: 10

mitm:
  hostnames:
    - "t.me"
